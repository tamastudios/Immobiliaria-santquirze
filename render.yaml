# Render Blueprint — despliega el backend (Strapi) + PostgreSQL automáticamente.
# En Render: New > Blueprint > conecta este repo. Render lee este archivo y crea
# la base de datos, el servicio y genera las claves de seguridad solo.
#
# NOTA: el plan "free" tiene 512 MB de RAM y la construcción de Strapi a veces
# se queda corta (error "out of memory"). Si falla el build, cambia el plan del
# servicio web a "starter" (~7 $/mes) en el panel de Render.

databases:
  - name: immosq-db
    databaseName: strapi
    user: strapi
    plan: free
    region: frankfurt

services:
  - type: web
    name: immosq-backend
    runtime: node
    rootDir: backend
    plan: free
    region: frankfurt
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /_health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: DATABASE_CLIENT
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: immosq-db
          property: connectionString
      - key: DATABASE_SSL
        value: "true"
      - key: DATABASE_SSL_REJECT_UNAUTHORIZED
        value: "false"
      # Claves de seguridad: Render las genera aleatorias y seguras.
      - key: APP_KEYS
        generateValue: true
      - key: API_TOKEN_SALT
        generateValue: true
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: TRANSFER_TOKEN_SALT
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      # Cloudinary (imágenes): añade estas 3 en el panel de Render cuando tengas cuenta.
      # - key: CLOUDINARY_NAME
      #   sync: false
      # - key: CLOUDINARY_KEY
      #   sync: false
      # - key: CLOUDINARY_SECRET
      #   sync: false
